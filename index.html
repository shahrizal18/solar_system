<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Solar System Simulation</title>
  <!-- astronomy-engine for JPL DE440-level ephemeris -->
  <script src="https://unpkg.com/astronomy-engine@3.0.0/browser/astronomy-engine.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.7);
      padding: 12px; border-radius: 8px; pointer-events: auto; min-width: 240px;
    }
    #ui label { display: block; margin: 6px 0 2px; font-size: 13px; }
    #ui input, #ui button, #ui select { width: 100%; margin: 2px 0; padding: 6px; border: none; border-radius: 4px; }
    #ui button { background: #2a6; color: #fff; cursor: pointer; }
    #ui button:hover { background: #3b7; }
    #info { margin-top: 8px; font-size: 12px; color: #aaa; }
    #scale-warning { color: #f88; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="ui">
    <h3 style="margin:0 0 8px;">🌌 Solar System</h3>
    <label>Time Speed (days/sec):</label>
    <input type="range" id="speed" min="0" max="100" value="10" step="0.1">
    <label>Date (J2000 + days):</label>
    <input type="number" id="date" value="0" step="0.1">
    <button id="play">⏯ Play/Pause</button>
    <label>Planet Scale:</label>
    <select id="scale">
      <option value="visual">Visual (Exaggerated)</option>
      <option value="scientific">Scientific (True Ratios)</option>
    </select>
    <div id="scale-warning">⚠️ Scientific scale makes planets invisible without zoom.</div>
    <div id="info">Click a planet to view data. Scroll to zoom.</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
